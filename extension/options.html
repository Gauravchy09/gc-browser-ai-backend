<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Assistant - Microphone Setup</title>
  <style>
    :root {
      --bg: #0d1117;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --card-bg: #161b22;
      --border: #30363d;
      --success: #3fb950;
      --error: #f85149;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    h1 { margin-top: 0; font-size: 20px; color: #fff; }
    p { color: #8b949e; line-height: 1.5; font-size: 14px; margin-bottom: 24px; }
    button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    #status {
      margin-top: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .success { color: var(--success); }
    .error { color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent); margin-bottom: 16px;">
      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="23"></line>
      <line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
    <h1>Microphone Access Required</h1>
    <p>Chrome does not allow sidebars to ask for permissions directly. Please click the button below and click "Allow" when the browser prompts you.</p>
    <button id="grantBtn">Grant Microphone Access</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
